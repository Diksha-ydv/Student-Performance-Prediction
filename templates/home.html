<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:100%;
            max-width:950px;
            background:#fff;
            border-radius:18px;
            padding:40px;
            box-shadow:0 20px 45px rgba(0,0,0,0.25);
        }

        h1{
            text-align:center;
            color:#222;
            margin-bottom:10px;
            font-size:34px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:35px;
            font-size:16px;
        }

        form{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:600;
            margin-bottom:8px;
            color:#333;
        }

        select,input{
            padding:13px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            transition:.3s;
        }

        select:focus,input:focus{
            border-color:#4f46e5;
            outline:none;
            box-shadow:0 0 10px rgba(79,70,229,.25);
        }

        .buttons{
            grid-column:1/3;
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:15px;
        }

        button{
            padding:14px 40px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
            font-weight:600;
        }

        .predict{
            background:#4f46e5;
            color:white;
        }

        .predict:hover{
            background:#3730a3;
        }

        .reset{
            background:#e5e7eb;
        }

        .reset:hover{
            background:#d1d5db;
        }

        .result{
            margin-top:35px;
            background:#eef4ff;
            border-left:6px solid #4f46e5;
            padding:20px;
            border-radius:12px;
            text-align:center;
        }

        .result h2{
            color:#333;
            margin-bottom:10px;
        }

        .prediction{
            font-size:34px;
            color:#4f46e5;
            font-weight:700;
        }

        @media(max-width:768px){

            form{
                grid-template-columns:1fr;
            }

            .buttons{
                grid-column:1;
                flex-direction:column;
            }

            h1{
                font-size:28px;
            }

            .container{
                padding:25px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <h1>📚 Student Performance Prediction</h1>

    <p class="subtitle">
        Predict the Mathematics Score based on student demographic and academic information.
    </p>

    <form action="/" method="POST">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race / Ethnicity</label>
            <select name="ethnicity" required>
                <option disabled selected>Select Group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>

                <option disabled selected>Select Education</option>

                <option value="some high school">Some High School</option>

                <option value="high school">High School</option>

                <option value="some college">Some College</option>

                <option value="associate's degree">Associate's Degree</option>

                <option value="bachelor's degree">Bachelor's Degree</option>

                <option value="master's degree">Master's Degree</option>

            </select>
        </div>

        <div class="form-group">
            <label>Lunch Type</label>

            <select name="lunch" required>

                <option disabled selected>Select Lunch</option>

                <option value="standard">Standard</option>

                <option value="free/reduced">Free / Reduced</option>

            </select>

        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>

            <select name="test_preparation_course" required>

                <option disabled selected>Select Option</option>

                <option value="completed">Completed</option>

                <option value="none">None</option>

            </select>

        </div>

        <div class="form-group">

            <label>Reading Score</label>

            <input
                type="number"
                name="reading_score"
                min="0"
                max="100"
                placeholder="0 - 100"
                required>

        </div>

        <div class="form-group">

            <label>Writing Score</label>

            <input
                type="number"
                name="writing_score"
                min="0"
                max="100"
                placeholder="0 - 100"
                required>

        </div>

        <div class="buttons">

            <button type="submit" class="predict">
                Predict Score
            </button>

            <button type="reset" class="reset">
                Clear
            </button>

        </div>

    </form>

    {% if results %}

    <div class="result">

        <h2>Predicted Mathematics Score</h2>

        <div class="prediction">

            {{ "%.2f"|format(results[0]) }}

        </div>

    </div>

    {% endif %}

</div>

</body>

</html>
